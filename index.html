<!DOCTYPE html>
<html>
<head>
  <title>Rapaziada 🍋</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: linear-gradient(45deg, #00ff88, #00ccff);
      padding: 40px;
      animation: fade 2s;
    }

    h1 {
      margin: 0;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #00ff88;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00cc66;
      transform: scale(1.1);
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<header>
  <h1>🍋 Rapaziada</h1>
  <p>Momentos da escola 🔥</p>
</header>

<br>

<a class="btn" href="#">📸 Ver Fotos</a>
<a class="btn" href="#">⬆️ Enviar Foto</a>
<a class="btn" href="#">🔗 Links</a>

<div class="gallery">
  <img src="https://via.placeholder.com/200">
  <img src="https://via.placeholder.com/200">
</div>

</body>
</html>
